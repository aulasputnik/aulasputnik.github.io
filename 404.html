<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Pàgina perduda a l'espai | AulaSPUTNIK</title>
    <link rel="icon" href="assets/images/icon.png" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&family=Urbanist:wght@300;400;700;800;900&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --space-dark: #0a0615;
            --space-mid:  #120d2a;
            --purple:     #a15df6;
            --purple-light: #c99aff;
            --white:      #ffffff;
            --muted:      rgba(255,255,255,0.6);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--space-dark);
            color: var(--white);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* ---- Star field ---- */
        .stars {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }

        .stars::before,
        .stars::after {
            content: '';
            position: absolute;
            inset: 0;
            background-image:
                radial-gradient(1px 1px at 10% 15%, rgba(255,255,255,0.9) 0%, transparent 100%),
                radial-gradient(1px 1px at 25% 40%, rgba(255,255,255,0.7) 0%, transparent 100%),
                radial-gradient(1.5px 1.5px at 40% 8%, rgba(255,255,255,0.8) 0%, transparent 100%),
                radial-gradient(1px 1px at 55% 60%, rgba(255,255,255,0.6) 0%, transparent 100%),
                radial-gradient(1px 1px at 70% 25%, rgba(255,255,255,0.9) 0%, transparent 100%),
                radial-gradient(2px 2px at 82% 75%, rgba(255,255,255,0.5) 0%, transparent 100%),
                radial-gradient(1px 1px at 90% 45%, rgba(255,255,255,0.8) 0%, transparent 100%),
                radial-gradient(1px 1px at 15% 80%, rgba(255,255,255,0.7) 0%, transparent 100%),
                radial-gradient(1.5px 1.5px at 60% 90%, rgba(255,255,255,0.6) 0%, transparent 100%),
                radial-gradient(1px 1px at 35% 65%, rgba(255,255,255,0.9) 0%, transparent 100%),
                radial-gradient(1px 1px at 78% 12%, rgba(255,255,255,0.7) 0%, transparent 100%),
                radial-gradient(1px 1px at 48% 35%, rgba(255,255,255,0.5) 0%, transparent 100%),
                radial-gradient(1.5px 1.5px at 5% 55%, rgba(255,255,255,0.8) 0%, transparent 100%),
                radial-gradient(1px 1px at 92% 88%, rgba(255,255,255,0.9) 0%, transparent 100%),
                radial-gradient(1px 1px at 20% 20%, rgba(255,255,255,0.6) 0%, transparent 100%);
        }

        .stars::after {
            background-image:
                radial-gradient(1px 1px at 8% 92%, rgba(255,255,255,0.7) 0%, transparent 100%),
                radial-gradient(1px 1px at 30% 5%, rgba(255,255,255,0.8) 0%, transparent 100%),
                radial-gradient(2px 2px at 50% 50%, rgba(161,93,246,0.4) 0%, transparent 100%),
                radial-gradient(1px 1px at 65% 70%, rgba(255,255,255,0.6) 0%, transparent 100%),
                radial-gradient(1px 1px at 85% 30%, rgba(255,255,255,0.9) 0%, transparent 100%),
                radial-gradient(1.5px 1.5px at 95% 60%, rgba(255,255,255,0.5) 0%, transparent 100%),
                radial-gradient(1px 1px at 42% 78%, rgba(255,255,255,0.7) 0%, transparent 100%),
                radial-gradient(1px 1px at 18% 48%, rgba(255,255,255,0.8) 0%, transparent 100%),
                radial-gradient(1px 1px at 72% 95%, rgba(255,255,255,0.6) 0%, transparent 100%),
                radial-gradient(2px 2px at 3% 30%, rgba(255,255,255,0.4) 0%, transparent 100%);
        }

        /* ---- Main content ---- */
        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 24px;
            max-width: 640px;
        }

        .error-code {
            font-family: 'Urbanist', sans-serif;
            font-size: clamp(6rem, 20vw, 10rem);
            font-weight: 900;
            line-height: 1;
            letter-spacing: -4px;
            background: linear-gradient(135deg, var(--purple-light), var(--purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            user-select: none;
        }

        .rocket {
            font-size: clamp(3rem, 10vw, 5rem);
            display: block;
            margin: 8px auto;
            animation: drift 6s ease-in-out infinite;
            filter: drop-shadow(0 0 20px rgba(161,93,246,0.6));
        }

        @keyframes drift {
            0%, 100% { transform: translateY(0) rotate(-8deg); }
            50%       { transform: translateY(-18px) rotate(4deg); }
        }

        h1 {
            font-family: 'Urbanist', sans-serif;
            font-size: clamp(1.4rem, 4vw, 2rem);
            font-weight: 800;
            margin: 16px 0 8px;
            color: var(--white);
        }

        .subtitle {
            color: var(--muted);
            font-size: 1rem;
            line-height: 1.6;
            margin-bottom: 36px;
        }

        .nav-links {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
        }

        .nav-links a {
            padding: 10px 22px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.9rem;
            text-decoration: none;
            transition: opacity 0.15s, transform 0.15s;
        }

        .nav-links a:hover { opacity: 0.85; transform: translateY(-2px); }

        .btn-primary {
            background: var(--purple);
            color: #fff;
        }

        .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: var(--white);
            border: 1px solid rgba(255,255,255,0.2);
        }

        .logo-wrap {
            position: fixed;
            top: 20px;
            left: 24px;
            z-index: 2;
        }

        .logo-wrap img {
            height: 36px;
            filter: brightness(0) invert(1);
            opacity: 0.85;
        }

        /* Language switcher */
        .lang-wrap {
            position: fixed;
            top: 20px;
            right: 24px;
            z-index: 2;
            display: flex;
            gap: 8px;
        }

        .lang-wrap button {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: rgba(255,255,255,0.8);
            padding: 5px 12px;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s;
        }

        .lang-wrap button:hover,
        .lang-wrap button.active {
            background: var(--purple);
            border-color: var(--purple);
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="stars"></div>

    <a class="logo-wrap" href="index.html" aria-label="AulaSPUTNIK — Inici">
        <img src="assets/images/logo.svg" alt="AulaSPUTNIK">
    </a>

    <div class="lang-wrap">
        <button data-lang="ca" class="active" onclick="setLang('ca')">CA</button>
        <button data-lang="es" onclick="setLang('es')">ES</button>
        <button data-lang="en" onclick="setLang('en')">EN</button>
    </div>

    <div class="container">
        <span class="rocket" aria-hidden="true">🚀</span>
        <div class="error-code" aria-label="Error 404">404</div>

        <h1 id="err-title">Pàgina perduda a l'espai</h1>
        <p class="subtitle" id="err-subtitle">
            Houston, tenim un problema. Sembla que aquesta pàgina ha sortit de l'òrbita.<br>
            No et preocupis, et portem de tornada a la base!
        </p>

        <nav class="nav-links" aria-label="Navegació d'error">
            <a class="btn-primary" href="index.html" id="btn-home">← Tornar a l'inici</a>
            <a class="btn-secondary" href="tallers.html" id="btn-workshops">Els nostres tallers</a>
            <a class="btn-secondary" href="#" onclick="history.back(); return false;" id="btn-back">Pàgina anterior</a>
        </nav>
    </div>

    <script>
        const i18n = {
            ca: {
                title:    'Pàgina perduda a l\'espai',
                subtitle: 'Houston, tenim un problema. Sembla que aquesta pàgina ha sortit de l\'òrbita.<br>No et preocupis, et portem de tornada a la base!',
                home:     '← Tornar a l\'inici',
                workshops:'Els nostres tallers',
                back:     'Pàgina anterior'
            },
            es: {
                title:    'Página perdida en el espacio',
                subtitle: 'Houston, tenemos un problema. Parece que esta página ha salido de órbita.<br>No te preocupes, ¡te llevamos de vuelta a la base!',
                home:     '← Volver al inicio',
                workshops:'Nuestros talleres',
                back:     'Página anterior'
            },
            en: {
                title:    'Page lost in space',
                subtitle: 'Houston, we have a problem. Looks like this page has left orbit.<br>Don\'t worry, we\'ll bring you back to base!',
                home:     '← Back to home',
                workshops:'Our workshops',
                back:     'Previous page'
            }
        };

        function setLang(lang) {
            const t = i18n[lang] || i18n.ca;
            document.getElementById('err-title').textContent   = t.title;
            document.getElementById('err-subtitle').innerHTML  = t.subtitle;
            document.getElementById('btn-home').textContent    = t.home;
            document.getElementById('btn-workshops').textContent = t.workshops;
            document.getElementById('btn-back').textContent    = t.back;
            document.querySelectorAll('.lang-wrap button').forEach(b => {
                b.classList.toggle('active', b.dataset.lang === lang);
            });
            document.documentElement.lang = lang;
            localStorage.setItem('userLanguage', lang);
        }

        // Auto-detect language
        const saved = localStorage.getItem('userLanguage');
        const browser = navigator.language?.split('-')[0];
        const detected = ['ca','es','en'].includes(saved) ? saved :
                         ['ca','es','en'].includes(browser) ? browser : 'ca';
        setLang(detected);
    </script>
</body>
</html>
